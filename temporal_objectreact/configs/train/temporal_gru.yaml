project_name: object_rel_nav_temporal
run_name: temporal_gru

# KEY PARAMS
mode: train
predict_dists: False
goal_type: "image_mask_enc"
obs_type: "disabled"
dims: 8
goal_uses_context: True          # mandatory for the temporal aggregator
use_mask_grad: False

# training setup
use_wandb: False
batch_size: 128
eval_batch_size: 32
epochs: 10
gpu_ids: [0]
num_workers: 6
eval_num_workers: 2
lr: 7e-4
optimizer: adam
seed: 0
save_every: 5

# model params
model_type: gnm_temporal
obs_encoding_size: 1024
goal_encoding_size: 1024
temporal_aggregator: gru         # plain GRU, no confidence gate
temporal_ema_lambda: 0.7

# noise augmentation (disabled here; gated variant turns it on)
noise_p: 0.0
noise_mode: zero

# warm-start: load upstream ObjectReact pretrained backbone (encoder + head).
# Filled in at run time by scripts/train_all.sh once weights are downloaded.
init_from: ./model_weights/object_react_latest.pth
freeze_backbone: False           # train backbone + aggregator jointly

normalize: True

# context
context_type: temporal
context_size: 5

# action / distance loss tradeoff (unused in our simple regression loop)
alpha: 0.5

distance:
  min_dist_cat: 0
  max_dist_cat: 20
action:
  min_dist_cat: 2
  max_dist_cat: 10
close_far_threshold: 10

len_traj_pred: 10
learn_angle: True

image_size: [85, 64]

precomputed_filename: ./libs/control/object_react/train/vint_train/data/data_splits/training/bigger_bot_0.3-sh_0.4/bigger_bot_0.3-sh_0.4_gt_topometric_e3d_masks_pls.h5
pl_perturb_ratio: 0.3
pl_perturb_type: max_val
mask_crop_ratio: 1.0

datasets:
  bigger_bot_0.3-sh_0.4:
    data_folder: ./libs/control/object_react/train/vint_train/data/data_splits/training/bigger_bot_0.3-sh_0.4/trajectories/
    train: ./libs/control/object_react/train/vint_train/data/data_splits/training/bigger_bot_0.3-sh_0.4/train/
    test: ./libs/control/object_react/train/vint_train/data/data_splits/training/bigger_bot_0.3-sh_0.4/test/
    end_slack: 10
    goals_per_obs: 2
    negative_mining: True
    images_subfolder: images
